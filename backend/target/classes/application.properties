# Server port
server.port=8080

# H2 in-memory database config
# Think of this like a spreadsheet that lives in RAM - fast, no setup, resets on restart
spring.datasource.url=jdbc:h2:mem:stockdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate - auto creates database tables from our Java classes
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 console - visit /h2-console to see your database visually (useful for learning!)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT secret key - used to sign login tokens (change this in production!)
app.jwt.secret=StockPredictorSecretKey2024ThisShouldBeLongEnoughForHS256Algorithm
app.jwt.expiration=86400000

# Allow React frontend (port 3000) to talk to backend (port 8080)
app.cors.allowed-origins=http://localhost:3000,https://*.github.dev,https://*.app.github.dev
